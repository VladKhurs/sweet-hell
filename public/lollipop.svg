<svg width="40" height="74" viewBox="0 0 40 74" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Свечение -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#ff6cb6" result="glowColor"/>
      <feComposite in="glowColor" in2="blur" operator="in" result="softGlow"/>
      <feMerge>
        <feMergeNode in="softGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Градиент для палочки -->
    <linearGradient id="stickGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4d4d4d"/>
      <stop offset="100%" style="stop-color:#66225b"/>
    </linearGradient>
  </defs>
  
  <!-- Группа с эффектом свечения -->
  <g filter="url(#glow)">
    <!-- 4 сектора леденца (conic gradient) -->
    <!-- Сектор 1: #ff6cb6 (0-90deg) -->
    <path d="M 20,20 L 20,0 A 20,20 0 0,1 40,20 Z" fill="#ff6cb6"/>
    
    <!-- Сектор 2: #ffa7d1 (90-180deg) -->
    <path d="M 20,20 L 40,20 A 20,20 0 0,1 20,40 Z" fill="#ffa7d1"/>
    
    <!-- Сектор 3: #b788e5 (180-270deg) -->
    <path d="M 20,20 L 20,40 A 20,20 0 0,1 0,20 Z" fill="#b788e5"/>
    
    <!-- Сектор 4: #cb2c36 (270-360deg) -->
    <path d="M 20,20 L 0,20 A 20,20 0 0,1 20,0 Z" fill="#cb2c36"/>
  </g>
  
  <!-- Палочка -->
  <rect x="18" y="40" width="4" height="30" fill="url(#stickGradient)"/>
  
  <!-- Тень палочки (box-shadow) -->
  <rect x="20" y="42" width="2" height="2" fill="#b788e5"/>
</svg>